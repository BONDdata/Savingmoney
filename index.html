<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบออมเงินนักเรียน</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f7f1;
            --primary: #4CAF50;
            --primary-dark: #2E7D32;
            --primary-darker: #1B5E20;
            --primary-light: #A5D6A7;
            --card-shadow: #c8e6c9;
            --text-main: #1B5E20;
            --white: #ffffff;
            --gold: #FFD700;
            --silver: #C0C0C0;
            --bronze: #CD7F32;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            margin: 0;
            padding: 20px 10px;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            gap: 20px;
            display: flex;
            flex-direction: column;
        }

        .header-title {
            text-align: center;
            font-size: 2.2em;
            font-weight: 700;
            color: var(--primary-dark);
            text-shadow: 1px 1px 0px #fff, 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        /* --- แถบเมนูแนวยาว (Navbar) --- */
        .navbar {
            background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 16px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 6px 0 var(--primary-darker), 0 10px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 16px 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border-right: 1px solid rgba(255,255,255,0.2);
        }

        .nav-item:last-child {
            border-right: none;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        /* สถานะเมื่อถูกเลือก (Active) */
        .nav-item.active {
            background: var(--primary-darker);
            color: var(--white);
            box-shadow: inset 0 4px 6px rgba(0,0,0,0.3);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Cards & Inputs --- */
        .card-3d {
            background-color: var(--white);
            padding: 30px;
            border-radius: 24px;
            border: 2px solid var(--white);
            box-shadow: 0 8px 0 var(--card-shadow), 0 15px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card-highlight {
            border: 2px solid var(--primary-light);
            background: linear-gradient(180deg, #ffffff 0%, #f9fdf9 100%);
        }

        h2, h3 {
            color: var(--primary-dark);
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px dashed var(--primary-light);
            padding-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: 600;
            color: #388E3C;
            margin-bottom: 5px;
        }

        /* ปรับช่องวันที่และเดือนให้เล็กลง */
        input[type="date"],
        input[type="month"] {
            width: auto;
            min-width: 200px;
            max-width: 250px;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        input[type="month"],
        select {
            padding: 12px 16px;
            border: 2px solid var(--primary-light);
            border-radius: 12px;
            box-sizing: border-box;
            background-color: #fcfdfc;
            color: var(--text-main);
            font-size: 16px;
            font-family: 'Sarabun', sans-serif;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.03);
            transition: all 0.3s ease;
        }

        select { width: 100%; max-width: 400px; }
        input[type="number"] { width: 100%; max-width: 400px; }

        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            background-color: #fff;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.02), 0 0 0 4px rgba(76, 175, 80, 0.15);
        }

        button.action-btn {
            background: linear-gradient(180deg, #66BB6A 0%, var(--primary) 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 15px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Sarabun', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 5px 0 var(--primary-dark), 0 8px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        button.action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0 var(--primary-dark), 0 2px 3px rgba(0,0,0,0.1);
        }

        button.btn-secondary { background: linear-gradient(180deg, #81c784 0%, #66bb6a 100%); box-shadow: 0 5px 0 #388e3c; }
        button.btn-secondary:active { box-shadow: 0 0px 0 #388e3c; transform: translateY(5px); }

        /* --- Ranking Styles --- */
        .rank-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .rank-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            padding: 15px 20px;
            border-radius: 16px;
            border: 2px solid var(--primary-light);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            font-size: 1.1em;
            font-weight: bold;
        }

        .rank-1 { border-left: 8px solid var(--gold); background-color: #fffde7; }
        .rank-2 { border-left: 8px solid var(--silver); background-color: #f5f5f5; }
        .rank-3 { border-left: 8px solid var(--bronze); background-color: #fff3e0; }

        .rank-medal { font-size: 1.5em; margin-right: 10px; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* --- Tables --- */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--primary-light);
        }

        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--card-shadow); }
        th { background-color: var(--primary-light); color: var(--text-main); }
        tr:nth-child(even) td { background-color: #f9fdf9; }
        .total-row td { font-weight: bold; background-color: var(--card-shadow) !important; color: var(--primary-dark); }

        img.icon { width: 28px; height: 28px; filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.1)); }
        img.nav-icon { width: 24px; height: 24px; filter: brightness(0) invert(1); }

        @media (min-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 600px) {
            .nav-item { font-size: 1em; padding: 12px 10px; flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>

    <div class="header-title">
        <img src="https://img.icons8.com/fluency/64/money-bag.png" alt="Icon" style="width: 50px; height: 50px;"/> 
        ระบบออมเงินนักเรียน
    </div>

    <div class="container">

        <div class="navbar">
            <div class="nav-item active" onclick="switchTab('dashboard')" id="btn-dashboard">
                <img src="https://img.icons8.com/fluency/48/combo-chart.png" class="nav-icon"> 
                สถิติการฝากเงิน
            </div>
            <div class="nav-item" onclick="switchTab('deposit')" id="btn-deposit">
                <img src="https://img.icons8.com/fluency/48/coins.png" class="nav-icon"> 
                ระบบฝากเงิน
            </div>
        </div>

        <div id="tab-dashboard" class="tab-content active">
            
            <div class="dashboard-grid">
                <div class="card-3d">
                    <h3><img src="https://img.icons8.com/fluency/48/bar-chart.png" class="icon"/> กราฟยอดออม 6 เดือนย้อนหลัง</h3>
                    <canvas id="monthlyChart" width="100" height="80"></canvas>
                    <p style="font-size: 0.85em; color: gray; text-align: center; margin-top: 10px;">* แสดงข้อมูลผลรวมยอดฝากจริงจากฐานข้อมูล</p>
                </div>

                <div class="card-3d">
                    <h3><img src="https://img.icons8.com/fluency/48/medal.png" class="icon"/> Top Savers ประจำเดือน</h3>
                    <label for="stats-month">เลือกเดือน:</label>
                    <input type="month" id="stats-month">
                    <br>
                    <button class="action-btn btn-secondary" onclick="loadMonthlyIndividualStats()">โหลดจัดอันดับ</button>
                    
                    <div id="ranking-container" class="rank-container"></div>
                    
                    <div id="individual-monthly-stats-table" style="margin-top: 20px;"></div>
                </div>
            </div>

        </div>

        <div id="tab-deposit" class="tab-content">
            <div class="card-3d card-highlight">
                <h2><img src="https://img.icons8.com/fluency/48/stack-of-coins.png" class="icon"/> บันทึกการฝากเงิน</h2>
                
                <label for="record-date">วันที่บันทึก:</label>
                <input type="date" id="record-date">
                
                <label for="student-name">ชื่อนักเรียน:</label>
                <select id="student-name"></select>

                <label for="deposit-amount">ยอดเงินฝาก (บาท):</label>
                <input type="number" id="deposit-amount" min="0" step="any" placeholder="ระบุจำนวนเงิน...">

                <br>
                <button class="action-btn" onclick="saveDeposit()">
                    <img src="https://img.icons8.com/ios-filled/50/FFFFFF/coins.png" class="icon" style="width:20px; height:20px; filter: none;"/> 
                    บันทึกยอดฝาก
                </button>
            </div>

            <div class="card-3d">
                <h2><img src="https://img.icons8.com/fluency/48/calendar.png" class="icon"/> สรุปยอดฝากประจำวัน</h2>
                <label for="summary-date">เลือกวันที่:</label>
                <input type="date" id="summary-date">
                <br>
                <button class="action-btn btn-secondary" onclick="loadDailySummary()">แสดงสรุปรายวัน</button>
                <div id="daily-summary-table"></div>
            </div>
        </div>

    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx766ZRphGDJnS2HZhxsqhrsbg9oPIkJqGl6JLeuwn9gULAeuGKbs8LhW_DaDsLBEya7g/exec";
        let myChart = null;

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('record-date').value = today;
            document.getElementById('summary-date').value = today;
            const currentMonth = new Date().toISOString().slice(0, 7); 
            document.getElementById('stats-month').value = currentMonth;
            
            fetchStudents(); // ดึงชื่อนักเรียน
            loadChartData(); // ดึงข้อมูลสถิติรวมรายเดือนมาวาดกราฟ
        };

        // --- ระบบสลับ Tab ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('btn-' + tabId).classList.add('active');

            if(tabId === 'dashboard') {
                loadMonthlyIndividualStats(); 
            }
        }

        // --- ดึงข้อมูลจริงสำหรับแสดงกราฟรวม (Chart) ---
        function loadChartData() {
            // ใช้ endpoint getOverallStats period monthly เพื่อดึงยอดทั้งหมด
            sendRequest('getOverallStats', { period: 'monthly' }, 'handleChartDataResponse', false);
        }

        window.handleChartDataResponse = function(response) {
            if (response.success && response.data) {
                let monthlyTotals = {};
                
                // รวมยอดเงินนักเรียนทั้งหมดเข้าด้วยกัน ตามแต่ละเดือน (item.period)
                response.data.forEach(item => {
                    let month = item.period; 
                    if (!monthlyTotals[month]) monthlyTotals[month] = 0;
                    monthlyTotals[month] += parseFloat(item.amount) || 0;
                });

                // จัดเรียงเดือนจากอดีต -> ปัจจุบัน
                let sortedMonths = Object.keys(monthlyTotals).sort();
                let last6Months = sortedMonths.slice(-6); // เอาแค่ 6 เดือนล่าสุด

                let labels = [];
                let dataValues = [];
                const thaiMonths = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];

                last6Months.forEach(m => {
                    let parts = m.split('-');
                    if (parts.length >= 2) {
                        let year = parseInt(parts[0]) + 543;
                        let monthIdx = parseInt(parts[1]) - 1;
                        labels.push(`${thaiMonths[monthIdx]} ${year.toString().slice(-2)}`); // เช่น ต.ค. 66
                    } else {
                        labels.push(m);
                    }
                    dataValues.push(monthlyTotals[m]);
                });

                if (labels.length === 0) {
                    labels = ['ยังไม่มีข้อมูล'];
                    dataValues = [0];
                }

                updateChart(labels, dataValues);
            }
        };

        function updateChart(labels, dataValues) {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            
            const chartData = {
                labels: labels,
                datasets: [{
                    label: 'ยอดฝากรวม (บาท)',
                    data: dataValues,
                    backgroundColor: [
                        'rgba(102, 187, 106, 0.8)', // สีเขียว
                        'rgba(66, 165, 245, 0.8)',  // สีฟ้า
                        'rgba(171, 71, 188, 0.8)',  // สีม่วง
                        'rgba(255, 112, 67, 0.8)',  // สีส้ม
                        'rgba(236, 64, 122, 0.8)',  // สีชมพู
                        'rgba(255, 202, 40, 0.8)'   // สีเหลือง
                    ],
                    borderColor: [
                        'rgba(67, 160, 71, 1)',
                        'rgba(30, 136, 229, 1)',
                        'rgba(142, 36, 170, 1)',
                        'rgba(244, 81, 30, 1)',
                        'rgba(216, 27, 96, 1)',
                        'rgba(255, 179, 0, 1)'
                    ],
                    borderWidth: 2,
                    borderRadius: 8, 
                    hoverOffset: 4
                }]
            };

            const config = {
                type: 'bar',
                data: chartData,
                options: {
                    responsive: true,
                    scales: { 
                        y: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' } 
                        },
                        x: {
                            grid: { display: false }
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(27, 94, 32, 0.9)',
                            titleFont: { family: 'Sarabun', size: 14 },
                            bodyFont: { family: 'Sarabun', size: 14 },
                            padding: 10,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    return 'ยอดรวม: ' + context.parsed.y.toLocaleString() + ' บาท';
                                }
                            }
                        }
                    }
                }
            };

            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, config);
        }

        // --- ระบบส่งคำขอ API ---
        function sendRequest(action, data, callbackName, showLoading = true) {
            if (showLoading) {
                Swal.fire({
                    title: 'กำลังประมวลผล...', allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });
            }

            let url = `${SCRIPT_URL}?action=${action}`;
            if (data) {
                for (const key in data) {
                    url += `&${encodeURIComponent(key)}=${encodeURIComponent(data[key])}`;
                }
            }
            url += `&callback=${callbackName}`;

            const script = document.createElement('script');
            script.src = url;
            script.onerror = function() { 
                if(showLoading) Swal.fire('ล้มเหลว!', 'ตรวจสอบอินเทอร์เน็ต', 'error');
                if (script.parentNode) script.parentNode.removeChild(script);
            };
            document.body.appendChild(script);

            setTimeout(() => { if (script.parentNode) script.parentNode.removeChild(script); }, 8000); 
        }

        window.handleSaveResponse = function(response) {
            if (response.success) {
                Swal.fire({title:'สำเร็จ!', text: response.message, icon: 'success'});
                document.getElementById('deposit-amount').value = '';
                if (document.getElementById('summary-date').value === document.getElementById('record-date').value) {
                    loadDailySummary();
                }
                loadChartData(); // อัปเดตกราฟอัตโนมัติเมื่อมีการฝากเงินใหม่
            } else {
                Swal.fire({title: 'ผิดพลาด!', text: response.message, icon: 'error'});
            }
        };

        window.handleFetchStudentsResponse = function(response) {
            Swal.close();
            if (response.success) {
                const studentSelect = document.getElementById('student-name');
                studentSelect.innerHTML = '<option value="">-- เลือกนักเรียน --</option>';
                response.data.forEach(student => {
                    const option = document.createElement('option');
                    option.value = student; option.textContent = student;
                    studentSelect.appendChild(option);
                });
            }
        };

        window.handleDailySummaryResponse = function(response) {
            Swal.close();
            const tableDiv = document.getElementById('daily-summary-table');
            if (response.success) {
                let html = '<table><thead><tr><th>ชื่อนักเรียน</th><th>ยอดฝาก (บาท)</th></tr></thead><tbody>';
                let total = 0;
                if (response.data && response.data.length > 0) {
                    response.data.forEach(item => {
                        html += `<tr><td>${item.name}</td><td>${item.amount.toFixed(2)}</td></tr>`;
                        total += item.amount;
                    });
                } else {
                    html += '<tr><td colspan="2" style="text-align:center;">ไม่พบข้อมูล</td></tr>';
                }
                html += `<tr class="total-row"><td>ยอดรวมประจำวัน:</td><td>${total.toFixed(2)}</td></tr></tbody></table>`;
                tableDiv.innerHTML = html;
            }
        };

        window.handleIndividualMonthlyStatsResponse = function(response) {
            Swal.close();
            const rankContainer = document.getElementById('ranking-container');
            const tableDiv = document.getElementById('individual-monthly-stats-table');
            
             if (response.success) {
                let studentsData = [];
                if (response.data) {
                    for (let name in response.data) {
                        studentsData.push({ name: name, amount: response.data[name] });
                    }
                }

                // สร้าง Ranking (ดึง 3 อันดับแรก)
                if(studentsData.length > 0) {
                    studentsData.sort((a, b) => b.amount - a.amount);
                    
                    let rankHtml = '';
                    const topCount = Math.min(3, studentsData.length); 
                    const medals = ['🥇', '🥈', '🥉'];
                    const rankClasses = ['rank-1', 'rank-2', 'rank-3'];

                    for(let i=0; i<topCount; i++) {
                        rankHtml += `
                            <div class="rank-item ${rankClasses[i]}">
                                <div><span class="rank-medal">${medals[i]}</span> ${studentsData[i].name}</div>
                                <div style="color:var(--primary-dark);">${studentsData[i].amount.toFixed(2)} ฿</div>
                            </div>
                        `;
                    }
                    rankContainer.innerHTML = rankHtml;
                } else {
                    rankContainer.innerHTML = '<p style="text-align:center; color:gray;">ยังไม่มีข้อมูลการฝากในเดือนนี้</p>';
                }

                let html = '<h4 style="margin-top:20px;">ข้อมูลรายบุคคลทั้งหมด</h4><table><thead><tr><th>ชื่อนักเรียน</th><th>ยอดฝากรวม (บาท)</th></tr></thead><tbody>';
                if (studentsData.length > 0) {
                    studentsData.sort((a,b) => a.name.localeCompare(b.name));
                    studentsData.forEach(item => {
                         html += `<tr><td>${item.name}</td><td>${item.amount.toFixed(2)}</td></tr>`;
                    });
                } else {
                    html += '<tr><td colspan="2" style="text-align:center;">ไม่พบข้อมูล</td></tr>';
                }
                html += '</tbody></table>';
                tableDiv.innerHTML = html;

            } else {
                rankContainer.innerHTML = '';
                tableDiv.innerHTML = `<p style="color:red;">ไม่สามารถโหลดสถิติได้</p>`;
            }
        };

        function saveDeposit() {
            const date = document.getElementById('record-date').value;
            const studentName = document.getElementById('student-name').value;
            const amount = parseFloat(document.getElementById('deposit-amount').value);

            if (!date || !studentName || isNaN(amount) || amount <= 0) {
                Swal.fire({title: 'แจ้งเตือน!', text: 'กรุณากรอกข้อมูลให้ครบถ้วนและถูกต้อง', icon: 'warning'});
                return;
            }
            sendRequest('saveDeposit', { date: date, studentName: studentName, amount: amount }, 'handleSaveResponse');
        }

        function fetchStudents() { sendRequest('getStudents', null, 'handleFetchStudentsResponse'); }
        
        function loadDailySummary() {
            const summaryDate = document.getElementById('summary-date').value;
            if (!summaryDate) return;
            sendRequest('getDailySummary', { date: summaryDate }, 'handleDailySummaryResponse');
        }

        function loadMonthlyIndividualStats() {
            const statsMonth = document.getElementById('stats-month').value;
            if (!statsMonth) return;
            sendRequest('getIndividualMonthlyStats', { monthYear: statsMonth }, 'handleIndividualMonthlyStatsResponse');
        }
    </script>
</body>
</html>
